<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Max Gaudelli Creative</title>
  <script>
    (function loadFreshAssets() {
      const version = Date.now().toString();

      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `styles.css?v=${version}`;
      document.head.appendChild(stylesheet);

      const embeddedDataScript = document.createElement("script");
      embeddedDataScript.src = `data/projects.js?v=${version}`;

      const script = document.createElement("script");
      script.src = `app.js?v=${version}`;
      script.defer = true;

      let appScriptAttached = false;
      const attachAppScript = () => {
        if (appScriptAttached) return;
        appScriptAttached = true;
        document.head.appendChild(script);
      };

      embeddedDataScript.addEventListener("load", attachAppScript, { once: true });
      embeddedDataScript.addEventListener("error", attachAppScript, { once: true });
      document.head.appendChild(embeddedDataScript);
    })();
  </script>
</head>
<body>
  <main id="desktop" aria-label="Windows XP desktop">
    <div id="desktop-icons" class="icon-grid" aria-label="Desktop icons"></div>
    <div id="selection-box" aria-hidden="true"></div>
    <section id="window-layer" aria-live="polite"></section>
  </main>

  <footer id="taskbar">
    <button id="start-button" class="xp-start" aria-label="About me menu"><span class="xp-start-logo" aria-hidden="true"></span><span class="xp-start-label">About me</span></button>
    <div id="task-items" aria-label="Open windows"></div>
    <div id="clock" aria-label="clock"></div>
  </footer>

  <template id="project-window-template">
    <article class="xp-window" role="dialog" aria-modal="false">
      <header class="title-bar drag-handle">
        <strong class="window-title"></strong>
        <div class="window-controls">
          <button class="window-btn" disabled aria-hidden="true">_</button>
          <button class="window-btn" disabled aria-hidden="true">▢</button>
          <button class="window-btn close-btn" aria-label="Close window">✕</button>
        </div>
      </header>
      <div class="window-content"></div>
    </article>
  </template>
</body>
</html>
