<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Gaudelli — Portfolio OS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="desktop" aria-label="Desktop">
    <div id="icon-grid" class="icon-grid"></div>
  </main>

  <footer class="taskbar">
    <button class="start-btn">start</button>
    <div class="taskbar-title">Portfolio Desktop</div>
    <div id="clock"></div>
  </footer>

  <template id="window-template">
    <section class="win-window" role="dialog" aria-modal="false">
      <header class="win-header drag-handle">
        <span class="win-title">Window</span>
        <div class="win-controls">
          <button class="win-close" aria-label="Close">✕</button>
        </div>
      </header>
      <div class="win-body"></div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
